backend:
  name: github
  repo: yunglordsimens/maria-chernobai-portfolio
  branch: main
  base_url: https://maria-chernobai-portfolio.vercel.app
  auth_endpoint: api/auth

media_folder: "public/media"
public_folder: "/media"

collections:
  - name: "content"
    label: "Content"
    files:
      # ── ПРОЕКТЫ ──
      - name: "projects"
        label: "Projects"
        file: "public/content/projects.json"
        format: "json"
        fields:
          - name: "projects"
            label: "Projects"
            label_singular: "Project"
            widget: "list"
            summary: "{{fields.title}} (order: {{fields.order}}) {{fields.media_type}}"
            fields:
              - { name: "id", label: "ID (slug)", widget: "string", hint: "URL-safe, lowercase, no spaces. e.g. leather-parfum" }
              - { name: "title", label: "Title", widget: "string" }
              - { name: "order", label: "Order", widget: "number", default: 50, value_type: "int", min: 1, max: 999, hint: "Lower = higher on page. Use 10, 20, 30... to leave gaps." }
              - { name: "year", label: "Year", widget: "number", value_type: "int", min: 2020, max: 2030 }
              - { name: "visible", label: "Visible", widget: "boolean", default: true, hint: "Hide without deleting" }
              - name: "tags"
                label: "Tags"
                widget: "list"
                field: { name: "tag", label: "Tag", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }

              # ── ОСНОВНОЕ МЕДИА (контейнер 2) ──
              - name: "media_type"
                label: "Main media type"
                widget: "select"
                options:
                  - { label: "Image (WebP/JPG)", value: "image" }
                  - { label: "Video (MP4)", value: "video" }
                  - { label: "Embed (iframe — interactive site)", value: "embed" }
                default: "image"
                hint: >
                  IMAGE: WebP, 1400px wide, quality 80. Use for static projects.
                  VIDEO: MP4 H.264, 1400px wide, CRF 23. Desktop: mouse scrubs through video. Mobile: autoplay loop.
                  EMBED: iframe with a live mini-site. Put URL in embed_url field.

              - { name: "media", label: "Hero image/video", widget: "file", hint: "Main media file. For image: WebP 1400px. For video: MP4 1400px, H.264, CRF 23. Ignored if media_type is embed." }

              - { name: "embed_url", label: "Embed URL", widget: "string", required: false, hint: "Only for media_type: embed. URL of the interactive site to iframe. Use GitHub Pages or a stable deploy — NOT a client's live production site. Example: https://yunglordsimens.github.io/project-name" }

              - { name: "has_audio", label: "Video has audio", widget: "boolean", default: false, required: false, hint: "Show sound on/off toggle in media panel. Only for video type." }

              # ── ССЫЛКА НА ПРОЕКТ ──
              - { name: "project_url", label: "Project link", widget: "string", required: false, hint: "Link to live site, GitHub Pages, or repo. For client work on their hosting: use GitHub Pages deploy of a stable snapshot. For your own toys: direct link. For repos: github.com/user/repo" }
              - name: "project_url_label"
                label: "Link label"
                widget: "select"
                options:
                  - { label: "View live", value: "View live" }
                  - { label: "GitHub", value: "GitHub" }
                  - { label: "Source code", value: "Source code" }
                  - { label: "Demo", value: "Demo" }
                default: "View live"
                required: false

              # ── ПРЕВЬЮ ДЛЯ ГРИДА ──
              - name: "thumb_type"
                label: "Grid thumbnail type"
                widget: "select"
                options:
                  - { label: "Static image (WebP)", value: "image" }
                  - { label: "Animated (video MP4)", value: "video" }
                  - { label: "Animated (GIF)", value: "gif" }
                default: "image"
                hint: >
                  Что показывать в карточке на главной.
                  IMAGE: WebP, 800×540, quality 75. Лёгкий, быстрый.
                  VIDEO: MP4 H.264, 800px wide, 3-8 сек, без звука, CRF 28. ~200-500KB. Autoplay при видимости.
                  GIF: ускоренная версия видео. Тяжелее MP4 (1-5MB), но совместимость 100%. Используй для коротких (3-4 сек).
                  --- Как готовить ---
                  ffmpeg -i original.mp4 -vf "scale=800:-2" -t 6 -an -c:v libx264 -crf 28 -preset veryslow -movflags +faststart thumb.mp4
                  ffmpeg -i original.mp4 -vf "scale=400:-2,setpts=0.5*PTS,fps=12" -t 4 -loop 0 thumb.gif
                  Или используй scripts/convert-media.sh

              - { name: "thumb", label: "Grid thumbnail (static)", widget: "image", hint: "WebP, 800×540, quality 75. Показывается как poster для видео, или как основной если thumb_type=image." }
              - { name: "thumb_video", label: "Grid thumbnail (video)", widget: "file", required: false, hint: "MP4 H.264, 800px, 3-8 сек, без звука, CRF 28. Только если thumb_type=video." }
              - { name: "thumb_gif", label: "Grid thumbnail (GIF)", widget: "image", required: false, hint: "Ускоренное видео как GIF. 400-800px wide, 12fps, 3-4 сек. Только если thumb_type=gif." }

              # ── ПРЕВЬЮ ДЛЯ САЙДБАРА ──
              - name: "sidebar_animated"
                label: "Animated sidebar thumbnail"
                widget: "boolean"
                default: false
                hint: "Показывать анимированное превью в списке проектов (боковая панель). Если вкл — нужен sidebar_thumb."

              - { name: "sidebar_thumb", label: "Sidebar thumbnail (animated)", widget: "file", required: false, hint: "Экстра-маленькое анимированное превью для списка. GIF или MP4. Макс 200px wide, 2-4 сек. ~50-150KB. ffmpeg -i original.mp4 -vf 'scale=200:-2,setpts=0.5*PTS,fps=10' -t 3 sidebar.gif" }

              # ── ГАЛЕРЕЯ ──
              - name: "gallery"
                label: "Gallery"
                widget: "list"
                required: false
                summary: "{{fields.type}}: {{fields.url}}"
                fields:
                  - { name: "url", label: "File", widget: "file" }
                  - name: "type"
                    label: "Type"
                    widget: "select"
                    options:
                      - { label: "Image", value: "image" }
                      - { label: "Video", value: "video" }
                    default: "image"
                    hint: "Image: WebP 1400px. Video: MP4 1400px, H.264."

              # ── СВЯЗАННЫЕ ──
              - name: "related"
                label: "Related project IDs"
                widget: "list"
                required: false
                field: { name: "id", label: "Project ID", widget: "string" }

      # ── О СЕБЕ / КОНТАКТЫ ──
      - name: "about"
        label: "About & Contact"
        file: "public/content/about.json"
        format: "json"
        fields:
          - { name: "name", label: "Name", widget: "string" }
          - { name: "role", label: "Role / Tagline", widget: "string" }
          - { name: "location", label: "Location", widget: "string" }
          - { name: "email", label: "Email", widget: "string" }
          - { name: "instagram", label: "Instagram", widget: "string" }
          - { name: "github", label: "GitHub", widget: "string" }
          - { name: "education", label: "Education", widget: "text" }
          - { name: "practice", label: "Practice", widget: "text" }
          - { name: "services", label: "Services", widget: "text" }
          - { name: "languages", label: "Languages", widget: "string" }
          - { name: "modeling", label: "Modeling", widget: "string", required: false }
          - { name: "available", label: "Availability", widget: "string" }
